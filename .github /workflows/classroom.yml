# --- 1. Rubric Configuration (Point-per-Test) ---
          # Abstraction Tests (30 pts)
          P_ABS_CLASS=15       # testIsAbstract (Checks if SmartDevice is abstract)
          P_ABS_METHOD=15      # testHasAbstractMethod (Checks if activate() is abstract)

          # Polymorphism Tests (40 pts)
          P_LIGHT_LOGIC=20     # testSmartLightLogic
          P_THERM_LOGIC=20     # testSmartThermostatLogic

          # Structure/Encapsulation (30 pts)
          P_ENCAP=15           # testPrivateFields
          P_POLY_ARRAY=15      # testMainUsesPolymorphicList

          # --- 2. Dynamic XML Discovery ---
          XML=$(find target/surefire-reports -name "TEST-*.xml" | head -n 1 || echo "")

          if [ -z "$XML" ] || [ ! -f "$XML" ]; then
            echo "::error title=Build Failed::No test reports found."
            exit 0
          fi

          # --- 3. Helper Function: Check Specific Test Outcome ---
          # Returns 0 if passed, 1 if failed
          check_test() {
            if awk "/<testcase name=\"$1\"/,/<\/testcase>/" "$XML" | grep -qE "<failure|<error"; then
              echo 0 # Failed
            else
              echo 1 # Passed
            fi
          }

          # --- 4. Logic Execution (Incremental Scoring) ---
          
          # Abstraction Scores
          S_ABS_CLASS=$(( $(check_test "testIsAbstract") * P_ABS_CLASS ))
          S_ABS_METHOD=$(( $(check_test "testHasAbstractMethod") * P_ABS_METHOD ))
          TOTAL_ABS=$(( S_ABS_CLASS + S_ABS_METHOD ))

          # Polymorphism Scores
          S_LIGHT=$(( $(check_test "testSmartLightLogic") * P_LIGHT_LOGIC ))
          S_THERM=$(( $(check_test "testSmartThermostatLogic") * P_THERM_LOGIC ))
          TOTAL_POLY=$(( S_LIGHT + S_THERM ))

          # Structure Scores
          S_ENCAP=$(( $(check_test "testPrivateFields") * P_ENCAP ))
          S_ARRAY=$(( $(check_test "testMainUsesPolymorphicList") * P_POLY_ARRAY ))
          TOTAL_STRUC=$(( S_ENCAP + S_ARRAY ))

          TOTAL_SCORE=$(( TOTAL_ABS + TOTAL_POLY + TOTAL_STRUC ))

          # --- 5. Generate Professional Summary Table ---
          echo "## 🧪 Lab 03/04: Abstraction & Polymorphism Results" >> $GITHUB_STEP_SUMMARY
          echo "### Final Grade: **$TOTAL_SCORE / 100**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Detail | Score | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- | :---: | :---: |" >> $GITHUB_STEP_SUMMARY
          echo "| **Abstraction** | Class & Method definition | $TOTAL_ABS / 30 | $([ $TOTAL_ABS -eq 30 ] && echo "✅" || echo "⚠️") |" >> $GITHUB_STEP_SUMMARY
          echo "| **Logic** | Light & Thermostat Output | $TOTAL_POLY / 40 | $([ $TOTAL_POLY -eq 40 ] && echo "✅" || echo "⚠️") |" >> $GITHUB_STEP_SUMMARY
          echo "| **Structure** | Encapsulation & Poly-List | $TOTAL_STRUC / 30 | $([ $TOTAL_STRUC -eq 30 ] && echo "✅" || echo "⚠️") |" >> $GITHUB_STEP_SUMMARY
          echo "| | **TOTAL SCORE** | **$TOTAL_SCORE** | |" >> $GITHUB_STEP_SUMMARY
